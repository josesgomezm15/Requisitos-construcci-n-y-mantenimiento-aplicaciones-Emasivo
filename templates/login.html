<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #ffffff;
      padding: 40px;
      width: 360px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #111;
    }

    .subtitle {
      font-size: 13px;
      color: #777;
      margin-bottom: 30px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      font-size: 12px;
      color: #555;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: #111;
    }

    .error-input {
      border-color: #e74c3c;
    }

    .error-msg {
      font-size: 12px;
      color: #e74c3c;
      margin-top: 5px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      background: #111;
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }

    .footer strong {
      color: #111;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Ingresa tus credenciales</p>

    <form method="POST" action="{{ url_for('login') }}">

      <div class="field">
        <label>Usuario</label>
        <input
          type="text"
          name="usuario"
          value="{{ usuario_ingresado }}"
          class="{{ 'error-input' if error_usuario else '' }}"
          required
        >
        {% if error_usuario %}
          <div class="error-msg">{{ error_usuario }}</div>
        {% endif %}
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          type="password"
          name="password"
          class="{{ 'error-input' if error_password else '' }}"
          required
        >
        {% if error_password %}
          <div class="error-msg">{{ error_password }}</div>
        {% endif %}
      </div>

      <button class="btn">Entrar</button>
    </form>

    <div class="footer">
      Usuario: <strong>admin2024</strong> · Password: <strong>password123</strong>
    </div>
  </div>

</body>
</html>
