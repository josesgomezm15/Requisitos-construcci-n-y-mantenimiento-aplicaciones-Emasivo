<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f6f8;
      color: #111;
      min-height: 100vh;
    }

    .container {
      max-width: 500px;
      margin: 80px auto;
      padding: 20px;
    }

    .header {
      margin-bottom: 25px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
    }

    .header p {
      font-size: 13px;
      color: #777;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: #111;
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .mensaje {
      margin-top: 15px;
      font-size: 13px;
      color: #555;
    }

    .token-box {
      margin-top: 15px;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Recuperar contraseña</h1>
    <p>Genera un token para restablecer tu contraseña</p>
  </div>

  <div class="card">

    <form method="POST">
      <input type="text" name="usuario" placeholder="Usuario" required>
      <button class="btn">Generar token</button>
    </form>

    <p class="mensaje">{{ mensaje }}</p>

    {% if token %}
      <div class="token-box">
        <p><strong>Token generado:</strong></p>
        <input type="text" value="{{ token }}" readonly>

        <a href="{{ url_for('reset_password') }}" class="btn">
          Ir a cambiar contraseña
        </a>
      </div>
    {% endif %}

  </div>

</div>

</body>
</html>
