<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cambiar contraseña</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #333;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .mensaje {
            margin-top: 15px;
            font-size: 14px;
            color: #e53e3e;
        }

        .success {
            color: #38a169;
        }

        .link {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #667eea;
            font-size: 14px;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔐 Cambiar contraseña</h2>

    <form method="POST">
        <input type="password" name="actual" placeholder="Contraseña actual" required>
        <input type="password" name="nueva" placeholder="Nueva contraseña" required>
        <button type="submit">Cambiar</button>
    </form>

    {% if mensaje %}
        <p class="mensaje {% if 'correctamente' in mensaje %}success{% endif %}">
            {{ mensaje }}
        </p>
    {% endif %}

    <a href="{{ url_for('dashboard') }}" class="link">⬅ Volver al dashboard</a>
</div>

</body>
</html>
